# Forward FLEXPART concentration run — Sacramento 100 kg/hr point source,
# 31 March 2020, on a ~500 m output grid. Sampled at the same three sensor
# locations as the MicroHH demo for a like-for-like concentration comparison.
#
# Note: ERA5 met is ~0.25-0.3 deg (~28 km), so near-field spread comes from
# FLEXPART's parameterized boundary-layer turbulence, NOT resolved eddies.

flexpart:
  executable:    ../flexpart/src/FLEXPART
  options_dir:   ../flexpart/tests/default_options
  available_file: ../runs/sacramento_valley_2020/meteo_april_week/AVAILABLE
  meteo_dir:     ../runs/sacramento_valley_2020/meteo_april_week/
  run_dir:       ../runs/flexpart_forward_sacramento_march31/flexpart_run/

simulation:
  start: "2020-03-31T00:00:00"
  end:   "2020-03-31T06:00:00"     # 6 h — enough for a quasi-steady near field
  output_step_seconds: 3600
  sync_seconds: 900
  nxshift: 0

domain:
  lon_min: -121.95
  lat_min:  38.95
  lon_max: -121.55
  lat_max:  39.35
  dx: 0.005
  dy: 0.005
  heights_m: [20.0, 100.0, 500.0, 1000.0]

species:
  name: CH4
  number: 24

sources:
  - type: point
    id: sacramento_point_100kghr
    lon: -121.75
    lat:  39.15
    alt_m: 20.0
    emission_rate_kg_s: 2.7777778e-2   # 100 kg/hr
    n_particles: 1000000
    start: "2020-03-31T00:00:00"
    end:   "2020-03-31T06:00:00"

output:
  path: ../runs/flexpart_forward_sacramento_march31/flexpart_forward.nc
  compress: true
  per_source: false
