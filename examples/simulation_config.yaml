# FLEXPART methane transport simulation config
# Run with:
#   from enforceflux.flexpart import FlexpartSimulation
#   sim = FlexpartSimulation.from_yaml("examples/simulation_config.yaml")
#   output_path = sim.run()

flexpart:
  executable: flexpart/src/FLEXPART
  options_dir: flexpart/options
  available_file: flexpart/AVAILABLE
  meteo_dir: inputs/meteo           # directory containing ERA5 / ECMWF met files
  run_dir: runs/simulation          # working directory for this run (recreated each run)

simulation:
  start: "2020-06-15T06:00:00"
  end:   "2020-06-15T18:00:00"
  output_step_seconds: 3600         # gridded output every hour
  sync_seconds: 900                 # FLEXPART internal sync interval

domain:
  lon_min: -123.0
  lon_max: -119.0
  lat_min:  37.0
  lat_max:  40.0
  dx: 0.1                           # degrees — output grid cell width
  dy: 0.1                           # degrees — output grid cell height
  heights_m: [100.0, 500.0, 1000.0] # output layer upper boundaries (m agl)

species:
  name: CH4                         # must match a SPECIES_* file in options/SPECIES/

sources:
  # --- Point source: dairy feedlot ---
  - type: point
    id: feedlot_A
    lon: -121.50
    lat:  38.60
    alt_m: 5.0
    emission_rate_kg_s: 2.0e-4      # ~17 kg/day
    n_particles: 10000
    # start/end inherit from simulation if omitted

  # --- Point source: landfill ---
  - type: point
    id: landfill_B
    lon: -120.80
    lat:  38.20
    alt_m: 10.0
    emission_rate_kg_s: 5.0e-4      # ~43 kg/day
    n_particles: 10000

  # --- Diffuse source: Central Valley rice paddies ---
  #   Area is subdivided into cell_size_deg x cell_size_deg release cells.
  #   Total emitted mass per cell = flux * cell_area_m2 * duration_s
  - type: diffuse
    id: rice_paddies_cv
    lon_min: -122.0
    lon_max: -121.0
    lat_min:  38.5
    lat_max:  39.5
    alt_m: 2.0
    emission_flux_kg_m2_s: 1.4e-9   # ~44 mg/m²/day (typical rice paddy CH4)
    cell_size_deg: 0.1
    n_particles_per_cell: 500

output:
  path: outputs/simulation_ch4.nc
  compress: true      # zlib compression in output NetCDF
  per_source: false   # true → FLEXPART writes separate concentration field per release
