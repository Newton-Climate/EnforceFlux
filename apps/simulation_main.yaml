# YAML config for apps/simulation_main.py
# Uses the existing EnforceFlux FLEXPART simulation schema plus simulation.mode.

flexpart:
  executable: ../flexpart/src/FLEXPART
  options_dir: ../flexpart/options
  available_file: ../data/tropomi_files/AVAILABLE
  meteo_dir: ../data/tropomi_files
  run_dir: ../runs/simulation_main

simulation:
  start: "2020-04-01T00:00:00"
  end: "2020-04-02T00:00:00"
  output_step_seconds: 3600
  sync_seconds: 900
  mode: forward  # forward | backward

domain:
  lon_min: -124.5
  lat_min: 36.5
  lon_max: -118.0
  lat_max: 42.0
  dx: 0.1
  dy: 0.1
  heights_m: [100.0, 500.0, 1000.0]

species:
  name: CH4
  number: 24

sources:
  - type: point
    id: sacramento_point_1
    lon: -121.5
    lat: 38.6
    alt_m: 10.0
    emission_rate_kg_s: 2.0e-4
    n_particles: 10000

  - type: diffuse
    id: valley_diffuse
    lon_min: -122.2
    lon_max: -121.0
    lat_min: 38.5
    lat_max: 39.8
    alt_m: 2.0
    emission_flux_kg_m2_s: 1.5e-9
    cell_size_deg: 0.2
    n_particles_per_cell: 500

output:
  path: ../outputs/simulation_main.nc
  compress: true
  per_source: false
